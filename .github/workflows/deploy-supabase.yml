name: Deploy to Supabase (cjgqpusyxvltglcbnpvg)

# Lovable's native Supabase integration is bound to a defunct, inaccessible
# project. This workflow keeps the REAL backend (cjgqpusyxvltglcbnpvg) in sync
# on every push to main — deploying edge functions, applying new migrations, and
# re-pinning the client if Lovable regenerates it with the old project. It is the
# substitute for the broken Lovable<->Supabase link.

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/migrations/**"
      - "src/integrations/supabase/client.ts"
  workflow_dispatch: {}

concurrency:
  group: deploy-supabase
  cancel-in-progress: false

env:
  PROJECT_REF: cjgqpusyxvltglcbnpvg
  NEW_SUPABASE_URL: https://cjgqpusyxvltglcbnpvg.supabase.co
  NEW_PUBLISHABLE_KEY: sb_publishable_Ic9uQiC0ATzTyMRzOXyWQA_7hnU8a2X

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy --project-ref "$PROJECT_REF"

      - name: Apply new migrations (token-only, via Management API)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: bash scripts/apply-migrations.sh

      - name: Sync function secrets (CRON_SECRET for the release job)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -n "$CRON_SECRET" ]; then
            supabase secrets set CRON_SECRET="$CRON_SECRET" --project-ref "$PROJECT_REF"
            echo "CRON_SECRET synced to Supabase."
          else
            echo "::warning::CRON_SECRET repo secret not set — the Monday release job will 401 until it is."
          fi

      - name: Sync function secrets (SHOPIFY_ADMIN_ACCESS_TOKEN for shopify-admin-data)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SHOPIFY_ADMIN_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ADMIN_ACCESS_TOKEN }}
        run: |
          if [ -n "$SHOPIFY_ADMIN_ACCESS_TOKEN" ]; then
            supabase secrets set SHOPIFY_ADMIN_ACCESS_TOKEN="$SHOPIFY_ADMIN_ACCESS_TOKEN" --project-ref "$PROJECT_REF"
            echo "SHOPIFY_ADMIN_ACCESS_TOKEN synced to Supabase."
          else
            echo "::warning::SHOPIFY_ADMIN_ACCESS_TOKEN repo secret not set — the shopify-admin-data function will 500 until it is."
          fi

      - name: Sync function secrets (OPENAI_API_KEY for image generation)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            supabase secrets set OPENAI_API_KEY="$OPENAI_API_KEY" --project-ref "$PROJECT_REF"
            echo "OPENAI_API_KEY synced to Supabase."
          else
            echo "::warning::OPENAI_API_KEY repo secret not set — book images fall back to Gemini instead of gpt-image-1."
          fi

      - name: Sync function secrets (ANTHROPIC_API_KEY for Claude story generation)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            supabase secrets set ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY" --project-ref "$PROJECT_REF"
            echo "ANTHROPIC_API_KEY synced to Supabase."
          else
            echo "::warning::ANTHROPIC_API_KEY repo secret not set — story generation falls back to Gemini instead of Claude Fable 5."
          fi

      - name: Re-pin Supabase client if Lovable reverted it
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          f=src/integrations/supabase/client.ts
          if grep -q "cjgqpusyxvltglcbnpvg" "$f"; then
            echo "client.ts already pinned to the current project — nothing to do."
            exit 0
          fi
          echo "client.ts points at the wrong project — re-pinning."
          sed -i -E "s#const SUPABASE_URL = \".*\"#const SUPABASE_URL = \"$NEW_SUPABASE_URL\"#" "$f"
          sed -i -E "s#const SUPABASE_PUBLISHABLE_KEY = \".*\"#const SUPABASE_PUBLISHABLE_KEY = \"$NEW_PUBLISHABLE_KEY\"#" "$f"
          git config user.name "torahtale-ci"
          git config user.email "ci@torahtale.local"
          git add "$f"
          git commit -m "ci: re-pin Supabase client to current project [skip ci]"
          git push
