name: backfill previews (one-shot)
on:
  workflow_dispatch: {}
jobs:
  d:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: trigger preview backfill for Molly and poll
        run: |
          set -uo pipefail
          REF=cjgqpusyxvltglcbnpvg
          BOOK=36f04829-97ad-4911-bf26-92fd9957b6ce
          API="https://api.supabase.com/v1/projects/${REF}/database/query"
          q(){ curl -s -X POST "$API" -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" -H "Content-Type: application/json" -d "$1"; }
          SR=$(curl -s "https://api.supabase.com/v1/projects/${REF}/api-keys?reveal=true" -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" | jq -r '.[]|select(.name=="service_role").api_key')

          echo "=== set status -> paid (non-terminal) so generate-book will process ==="
          curl -s -o /dev/null -w "patch %{http_code}\n" -X PATCH "https://${REF}.supabase.co/rest/v1/books?id=eq.${BOOK}" \
            -H "apikey: ${SR}" -H "Authorization: Bearer ${SR}" -H "Content-Type: application/json" -H "Prefer: return=minimal" \
            -d '{"status":"paid"}'

          echo "=== invoke generate-book (x-cron-secret) ==="
          curl -s -o /tmp/gb.json -w "generate-book HTTP %{http_code}\n" -X POST \
            "https://${REF}.supabase.co/functions/v1/generate-book" \
            -H "x-cron-secret: ${CRON_SECRET}" -H "Content-Type: application/json" \
            -d "{\"bookId\":\"${BOOK}\"}"
          head -c 300 /tmp/gb.json; echo

          echo "=== poll for preview images (up to ~4 min) ==="
          for i in $(seq 1 12); do
            sleep 20
            R=$(q "{\"query\":\"select p->>'portion' as portion, (p->>'image') is not null as has_img from books, jsonb_array_elements(pages_data::jsonb) as p where id='${BOOK}' and p->>'type'='preview'\"}")
            echo "attempt $i:"; echo "$R" | jq -c '.[]?'
            STATUS=$(q "{\"query\":\"select status from books where id='${BOOK}'\"}" | jq -r '.[0].status')
            FILLED=$(echo "$R" | jq '[.[]|select(.has_img==true)]|length')
            echo "  status=$STATUS preview_images=$FILLED/4"
            if [ "$FILLED" = "4" ]; then echo "ALL 4 PREVIEWS READY"; break; fi
          done
