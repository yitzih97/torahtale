name: DB check order (one-shot)
on: { workflow_dispatch: {} }
jobs:
  chk:
    runs-on: ubuntu-latest
    steps:
      - name: printify-submit edge logs
        env: { SUPABASE_ACCESS_TOKEN: "${{ secrets.SUPABASE_ACCESS_TOKEN }}" }
        run: |
          set -euo pipefail
          REF=cjgqpusyxvltglcbnpvg
          START=$(date -u -d '2 hours ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u +%Y-%m-%dT%H:%M:%SZ)
          END=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "window: $START .. $END"
          curl -s -G "https://api.supabase.com/v1/projects/${REF}/analytics/endpoints/logs.all" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            --data-urlencode "iso_timestamp_start=${START}" \
            --data-urlencode "iso_timestamp_end=${END}" \
            --data-urlencode "sql=select event_message, timestamp from function_edge_logs order by timestamp desc limit 50" \
            | jq -r '.result[]? | .event_message' 2>/dev/null | grep -iE "printify|error|401|403|token|unauthor" | head -30 || echo "no matching log lines"
