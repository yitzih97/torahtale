name: DB check order (one-shot)
on: { workflow_dispatch: {} }
jobs:
  chk:
    runs-on: ubuntu-latest
    steps:
      - name: Recent approved/ordered books + printify state
        env: { SUPABASE_ACCESS_TOKEN: "${{ secrets.SUPABASE_ACCESS_TOKEN }}" }
        run: |
          set -euo pipefail
          API="https://api.supabase.com/v1/projects/cjgqpusyxvltglcbnpvg/database/query"
          q(){ jq -n --arg query "$1" '{query:$query}' | curl -s -X POST "$API" -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" -H "Content-Type: application/json" --data @-; echo; }
          echo "== recent books (status/printify ids) =="
          q "select id, status, order_number, shopify_order_name, printify_product_id, printify_order_id, updated_at from public.books where status in ('approved','ordered','printing','pending_review','paid') order by updated_at desc limit 12;"
          echo "== printify config in site_settings =="
          q "select key, left(value,40) as value from public.site_settings where key like 'printify-%' or key = 'printify-shop-id' order by key;"
