name: DB fix stuck jobs (one-shot)
on: { workflow_dispatch: {} }
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Finish backfill (bounded) then VACUUM FULL
        env:
          SUPABASE_ACCESS_TOKEN: "${{ secrets.SUPABASE_ACCESS_TOKEN }}"
          CRON_SECRET: "${{ secrets.CRON_SECRET }}"
        run: |
          set -euo pipefail
          FN="https://cjgqpusyxvltglcbnpvg.supabase.co/functions/v1/backfill-images"
          API="https://api.supabase.com/v1/projects/cjgqpusyxvltglcbnpvg/database/query"
          q(){ jq -n --arg query "$1" '{query:$query}' | curl -s -X POST "$API" -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" -H "Content-Type: application/json" --data @-; echo; }
          echo "== backfill loop (one book / few images per call) =="
          for i in $(seq 1 40); do
            resp=$(curl -s -X POST "$FN" -H "x-cron-secret: ${CRON_SECRET}" -H "Content-Type: application/json" --data '{}')
            echo "pass $i: $resp"
            echo "$resp" | jq -e '.done == true' >/dev/null 2>&1 && { echo "BACKFILL DONE"; break; }
            sleep 2
          done
          echo "== remaining base64 books =="
          q "select count(*) as still_b64 from public.books where pages_data::text like '%data:image%' or story_data::text like '%data:image%' or coalesce(cover_image_url,'') like 'data:image%';"
          echo "== VACUUM FULL =="
          q "vacuum full public.books;"
          echo "== sizes AFTER =="
          q "select pg_size_pretty(pg_total_relation_size('public.books')) as books, pg_size_pretty(pg_database_size(current_database())) as db;"
