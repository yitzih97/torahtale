name: DB fix stuck jobs (one-shot)
on: { workflow_dispatch: {} }
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect + reset stuck books
        env: { SUPABASE_ACCESS_TOKEN: "${{ secrets.SUPABASE_ACCESS_TOKEN }}" }
        run: |
          set -euo pipefail
          API="https://api.supabase.com/v1/projects/cjgqpusyxvltglcbnpvg/database/query"
          q(){ jq -n --arg query "$1" '{query:$query}' | curl -s -X POST "$API" -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" -H "Content-Type: application/json" --data @-; echo; }
          echo "== generating books detail =="
          q "select id, status, updated_at, now() as now_utc, (pages_data is not null and jsonb_typeof(pages_data)='array' and jsonb_array_length(pages_data)>0) as has_pages from public.books where status='generating' order by updated_at;"
          echo "== reset ALL generating -> pending_review/paid =="
          q "update public.books set status = case when pages_data is not null and jsonb_typeof(pages_data)='array' and jsonb_array_length(pages_data)>0 then 'pending_review' else 'paid' end, updated_at = now() where status='generating' returning id, status;"
          echo "== status counts after =="
          q "select status, count(*) from public.books group by status order by count(*) desc;"
