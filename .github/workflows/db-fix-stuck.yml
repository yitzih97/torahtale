name: DB fix stuck jobs (one-shot)
on: { workflow_dispatch: {} }
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch a full URL and test reachability
        env: { SUPABASE_ACCESS_TOKEN: "${{ secrets.SUPABASE_ACCESS_TOKEN }}" }
        run: |
          set -euo pipefail
          API="https://api.supabase.com/v1/projects/cjgqpusyxvltglcbnpvg/database/query"
          resp=$(jq -n '{query:"select cover_image_url from public.books where cover_image_url like '"'"'http%'"'"' limit 1;"}' | curl -s -X POST "$API" -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" -H "Content-Type: application/json" --data @-)
          url=$(echo "$resp" | jq -r '.[0].cover_image_url')
          echo "URL: $url"
          curl -s -o /dev/null -w "public image fetch -> HTTP %{http_code}, type=%{content_type}, %{size_download} bytes\n" --max-time 30 "$url"
