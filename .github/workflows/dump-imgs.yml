name: Dump imgs (one-shot)
on: { workflow_dispatch: {} }
jobs:
  d:
    runs-on: ubuntu-latest
    steps:
      - name: emit image urls
        env: { SUPABASE_ACCESS_TOKEN: "${{ secrets.SUPABASE_ACCESS_TOKEN }}" }
        run: |
          set -euo pipefail
          API="https://api.supabase.com/v1/projects/cjgqpusyxvltglcbnpvg/database/query"
          jq -n --arg query "select p->>'image' as img, p->>'type' as t from public.books, jsonb_array_elements(pages_data) with ordinality p(p,ord) where id='a7c8e61a-bdec-4cdb-82ca-791faeddde1b' order by ord limit 3" '{query:$query}' \
            | curl -s -X POST "$API" -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" -H "Content-Type: application/json" --data @- | jq -c '.[] | {t, img}'
