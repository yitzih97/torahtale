name: Diagnose order (one-shot)

# Temporary diagnostic: looks up a book/order in the live DB via the Management
# API (SQL endpoint) so we can see why an approved order didn't reach Printify.
# Run: gh workflow run diagnose-order.yml -f q=1003
# Remove this file once done.

on:
  workflow_dispatch:
    inputs:
      q:
        description: "Search term (order number, name, or child name)"
        required: true
        default: "1003"

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Query books + printify settings
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          Q: ${{ github.event.inputs.q }}
        run: |
          set -euo pipefail
          REF=cjgqpusyxvltglcbnpvg
          run_sql() {
            curl -s -X POST \
              "https://api.supabase.com/v1/projects/${REF}/database/query" \
              -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$1"
          }

          echo "=================== BOOK / ORDER MATCHES for '${Q}' ==================="
          BOOK_SQL=$(cat <<SQL
          select id, child_name, torah_portion, status,
                 (paid_at is not null) as paid, paid_at,
                 shopify_order_id, shopify_order_name, order_number,
                 printify_product_id, printify_order_id,
                 jsonb_array_length(coalesce(pages_data::jsonb,'[]'::jsonb)) as page_count,
                 (shipping_data->>'quantity') as qty,
                 (shipping_data->'bookOptions'->>'productType') as product_type,
                 created_at, updated_at
          from books
          where child_name ilike '%${Q}%'
             or coalesce(shopify_order_name,'') ilike '%${Q}%'
             or coalesce(order_number,'')::text ilike '%${Q}%'
             or coalesce(shopify_order_id,'')::text ilike '%${Q}%'
          order by updated_at desc
          limit 25;
          SQL
          )
          run_sql "$(jq -n --arg q "$BOOK_SQL" '{query:$q}')" | jq .

          echo "=================== PAGES BREAKDOWN (image format/size per page) ==================="
          PAGES_SQL="select p->>'type' as type, p->>'page' as page, (p->>'imageUrl') is not null as has_imageUrl, case when (p->>'image') is not null then left(p->>'image',24) else '(none)' end as image_prefix, length(p->>'image') as image_len from books, jsonb_array_elements(pages_data::jsonb) with ordinality as t(p, ord) where child_name ilike '%${Q}%' order by ord;"
          run_sql "$(jq -n --arg q "$PAGES_SQL" '{query:$q}')" | jq .

          echo "=================== PRINTIFY site_settings ==================="
          run_sql '{"query":"select key, value from site_settings where category = '"'"'integrations'"'"' and key like '"'"'printify-%'"'"' order by key;"}' | jq .

      - name: Test Printify API (key + softcover blueprint lookup)
        env:
          PRINTIFY_API_KEY: ${{ secrets.PRINTIFY_API_KEY }}
        run: |
          set -uo pipefail
          if [ -z "${PRINTIFY_API_KEY:-}" ]; then
            echo "::error::PRINTIFY_API_KEY repo secret is EMPTY — this alone breaks order submission."
            exit 0
          fi
          echo "=================== 1) List shops (validates key) ==================="
          code=$(curl -s -o /tmp/shops.json -w "%{http_code}" \
            "https://api.printify.com/v1/shops.json" \
            -H "Authorization: Bearer ${PRINTIFY_API_KEY}")
          echo "HTTP $code"
          if [ "$code" = "401" ] || [ "$code" = "403" ]; then
            echo "::error::Printify key REJECTED ($code) — this is why submit fails at the variants lookup."
          fi
          jq -r 'if type=="array" then map({id,title}) else . end' /tmp/shops.json 2>/dev/null | head -40 || cat /tmp/shops.json | head -c 400
          echo
          echo "=================== 2) Softcover blueprint 2733 / provider 28 variants ==================="
          code=$(curl -s -o /tmp/var.json -w "%{http_code}" \
            "https://api.printify.com/v1/catalog/blueprints/2733/print_providers/28/variants.json" \
            -H "Authorization: Bearer ${PRINTIFY_API_KEY}")
          echo "HTTP $code"
          echo "-- does configured variant 149010 exist, and what print placeholders does it expose? --"
          jq '{total_variants: (.variants|length), v149010: (.variants[]|select(.id==149010)|{id, title, placeholders: [.placeholders[].position]})}' /tmp/var.json 2>/dev/null || { echo "raw:"; head -c 500 /tmp/var.json; }
