name: DB get book images (one-shot)
on: { workflow_dispatch: {} }
jobs:
  g:
    runs-on: ubuntu-latest
    steps:
      - name: Dump book image srcs + shipping
        env: { SUPABASE_ACCESS_TOKEN: "${{ secrets.SUPABASE_ACCESS_TOKEN }}" }
        run: |
          set -euo pipefail
          API="https://api.supabase.com/v1/projects/cjgqpusyxvltglcbnpvg/database/query"
          q(){ jq -n --arg query "$1" '{query:$query}' | curl -s -X POST "$API" -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" -H "Content-Type: application/json" --data @-; }
          echo "== image srcs (type + first 80 chars) =="
          q "select jsonb_array_length(pages_data) as n, (select string_agg(left(coalesce(p->>'image',''),70), ' | ') from jsonb_array_elements(pages_data) p) as imgs, shipping_data->>'countryCode' as cc, shipping_data->>'city' as city from public.books where id='a7c8e61a-bdec-4cdb-82ca-791faeddde1b';" | jq -c '.[0] | {n, cc, city}'
          echo "== count of pages with a real image =="
          q "select count(*) filter (where (p->>'image') is not null and p->>'image' <> '') as with_img, count(*) as total from public.books, jsonb_array_elements(pages_data) p where id='a7c8e61a-bdec-4cdb-82ca-791faeddde1b';"
          echo "== is any image still a data: URL (would bloat upload)? =="
          q "select count(*) as data_urls from public.books, jsonb_array_elements(pages_data) p where id='a7c8e61a-bdec-4cdb-82ca-791faeddde1b' and (p->>'image') like 'data:%';"
