name: DB confirm order (one-shot)
on: { workflow_dispatch: {} }
jobs:
  c:
    runs-on: ubuntu-latest
    steps:
      - name: Check printify ids
        env: { SUPABASE_ACCESS_TOKEN: "${{ secrets.SUPABASE_ACCESS_TOKEN }}" }
        run: |
          set -euo pipefail
          API="https://api.supabase.com/v1/projects/cjgqpusyxvltglcbnpvg/database/query"
          q(){ jq -n --arg query "$1" '{query:$query}' | curl -s -X POST "$API" -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" -H "Content-Type: application/json" --data @-; echo; }
          q "select id, child_name, status, printify_product_id, printify_order_id, updated_at from public.books where printify_product_id is not null or printify_order_id is not null or status in ('approved','ordered','printing') order by updated_at desc limit 6;"
