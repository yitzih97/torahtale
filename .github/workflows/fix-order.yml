name: Fix order 1003 (one-shot)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "reset-raw"
        required: true
        default: "reset-raw"

jobs:
  fix:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - name: Reset book row (raw response)
        run: |
          set -uo pipefail
          REF=cjgqpusyxvltglcbnpvg
          BOOK=36f04829-97ad-4911-bf26-92fd9957b6ce
          echo "=== raw UPDATE response ==="
          curl -s -X POST "https://api.supabase.com/v1/projects/${REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" -H "Content-Type: application/json" \
            -d "{\"query\":\"update books set printify_order_id=null, printify_product_id=null, order_number=null, status='pending_review', updated_at=now() where id='${BOOK}';\"}"
          echo
          echo "=== read back ==="
          curl -s -X POST "https://api.supabase.com/v1/projects/${REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" -H "Content-Type: application/json" \
            -d "{\"query\":\"select status, printify_order_id, printify_product_id from books where id='${BOOK}';\"}"
          echo
