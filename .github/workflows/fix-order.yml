name: Fix order 1003 (one-shot)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "reset"
        required: true
        default: "reset"

jobs:
  fix:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - name: Reset book via service-role PostgREST (bypasses RLS)
        run: |
          set -uo pipefail
          REF=cjgqpusyxvltglcbnpvg
          BOOK=36f04829-97ad-4911-bf26-92fd9957b6ce

          echo "=== fetch service_role key via Management API ==="
          KEYS=$(curl -s "https://api.supabase.com/v1/projects/${REF}/api-keys?reveal=true" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}")
          SR=$(echo "$KEYS" | jq -r '.[] | select(.name=="service_role") | .api_key')
          if [ -z "$SR" ] || [ "$SR" = "null" ]; then
            echo "available key names:"; echo "$KEYS" | jq -r '.[].name'
            echo "::error::could not obtain service_role key"; exit 1
          fi
          echo "got service_role key (len ${#SR})"

          echo "=== PATCH books (clear printify ids, status -> pending_review) ==="
          code=$(curl -s -o /tmp/patch.json -w "%{http_code}" -X PATCH \
            "https://${REF}.supabase.co/rest/v1/books?id=eq.${BOOK}" \
            -H "apikey: ${SR}" -H "Authorization: Bearer ${SR}" \
            -H "Content-Type: application/json" -H "Prefer: return=representation" \
            -d '{"printify_order_id":null,"printify_product_id":null,"order_number":null,"status":"pending_review"}')
          echo "PATCH HTTP $code"
          jq '[.[] | {id, status, printify_order_id, printify_product_id, order_number}]' /tmp/patch.json 2>/dev/null || cat /tmp/patch.json
          [ "${code:0:1}" = "2" ]
