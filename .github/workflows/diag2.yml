name: diag2 (one-shot)
on:
  workflow_dispatch:
    inputs:
      place:
        description: "yes to actually place the order"
        required: true
        default: "no"
jobs:
  d:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PRINTIFY_API_KEY: ${{ secrets.PRINTIFY_API_KEY }}
      PLACE: ${{ github.event.inputs.place }}
    steps:
      - name: verify product, place order, write back
        run: |
          set -uo pipefail
          REF=cjgqpusyxvltglcbnpvg
          BOOK=36f04829-97ad-4911-bf26-92fd9957b6ce
          SHOP=26962304
          PID=6a51273eb7ca88aabd057592
          API="https://api.supabase.com/v1/projects/${REF}/database/query"
          q(){ curl -s -X POST "$API" -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" -H "Content-Type: application/json" -d "$1"; }

          echo "=== product placeholder image counts ==="
          PROD=$(curl -s -H "Authorization: Bearer ${PRINTIFY_API_KEY}" "https://api.printify.com/v1/shops/${SHOP}/products/${PID}.json")
          echo "$PROD" | jq '[.print_areas[].placeholders[] | {position, imgs:(.images|length)}]'
          NEMPTY=$(echo "$PROD" | jq '[.print_areas[].placeholders[] | select((.images|length)==0)] | length')
          NFILLED=$(echo "$PROD" | jq '[.print_areas[].placeholders[] | select((.images|length)>0)] | length')
          echo "filled placeholders: $NFILLED ; empty: $NEMPTY"

          if [ "$PLACE" != "yes" ]; then echo "(dry run — pass place=yes to submit)"; exit 0; fi
          if [ "$NFILLED" -lt 21 ] || [ "$NEMPTY" -ne 0 ]; then
            echo "::error::product not fully populated (filled=$NFILLED empty=$NEMPTY) — NOT placing"; exit 1
          fi

          ROW=$(q "{\"query\":\"select shopify_order_id, shopify_order_name, shipping_data from books where id='${BOOK}'\"}")
          SD=$(echo "$ROW" | jq '.[0].shipping_data')
          EXT="$(echo "$ROW" | jq -r '.[0].shopify_order_id // empty')"; [ -z "$EXT" ] && EXT="$BOOK"
          EXT="${EXT}-fix$(date +%s)"
          LABEL=$(echo "$ROW" | jq -r '.[0].shopify_order_name // "Torah Tale"')
          QTY=$(echo "$SD" | jq -r '(.quantity // 1)')
          ADDR=$(echo "$SD" | jq '{first_name:(.firstName//"Customer"), last_name:(.lastName//""), email:(.email//""), phone:(.phone//""), country:(.countryCode//.country//"US"), region:(.provinceCode//.province//.state//""), address1:(.address1//""), address2:(.address2//""), city:(.city//""), zip:(.zip//"")}')
          BODY=$(jq -n --arg ext "$EXT" --arg label "$LABEL" --arg pid "$PID" --argjson qty "${QTY:-1}" --argjson addr "$ADDR" \
            '{external_id:$ext, label:$label, line_items:[{product_id:$pid, variant_id:149010, quantity:$qty}], shipping_method:1, send_shipping_notification:false, address_to:$addr}')

          echo "=== POST order (external_id=$EXT) ==="
          code=$(curl -s -o /tmp/o.json -w "%{http_code}" -X POST "https://api.printify.com/v1/shops/${SHOP}/orders.json" \
            -H "Authorization: Bearer ${PRINTIFY_API_KEY}" -H "Content-Type: application/json" -d "$BODY")
          echo "order HTTP $code"; cat /tmp/o.json; echo
          [ "${code:0:1}" = "2" ] || { echo "::error::order failed"; exit 1; }
          OID=$(jq -r '.id' /tmp/o.json)
          echo "placed order $OID"

          echo "=== write back to book (service-role) ==="
          SR=$(curl -s "https://api.supabase.com/v1/projects/${REF}/api-keys?reveal=true" -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" | jq -r '.[]|select(.name=="service_role").api_key')
          curl -s -o /dev/null -w "patch %{http_code}\n" -X PATCH "https://${REF}.supabase.co/rest/v1/books?id=eq.${BOOK}" \
            -H "apikey: ${SR}" -H "Authorization: Bearer ${SR}" -H "Content-Type: application/json" -H "Prefer: return=minimal" \
            -d "{\"status\":\"printing\",\"printify_product_id\":\"${PID}\",\"printify_order_id\":\"${OID}\",\"order_number\":\"${OID}\"}"
          echo "DONE — #1003 placed with correct images: order $OID"
