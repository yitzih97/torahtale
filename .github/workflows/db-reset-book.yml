name: DB reset book (one-shot)
on: { workflow_dispatch: {} }
jobs:
  r:
    runs-on: ubuntu-latest
    steps:
      - name: Reset approved book to pending_review
        env: { SUPABASE_ACCESS_TOKEN: "${{ secrets.SUPABASE_ACCESS_TOKEN }}" }
        run: |
          set -euo pipefail
          API="https://api.supabase.com/v1/projects/cjgqpusyxvltglcbnpvg/database/query"
          q(){ jq -n --arg query "$1" '{query:$query}' | curl -s -X POST "$API" -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" -H "Content-Type: application/json" --data @-; echo; }
          q "alter table public.books disable trigger guard_book_privileged_fields; update public.books set status='pending_review', updated_at=now() where id='a7c8e61a-bdec-4cdb-82ca-791faeddde1b' and status='approved' returning id, status; alter table public.books enable trigger guard_book_privileged_fields;"
