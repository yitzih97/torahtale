name: DB maintenance (one-shot)
on:
  workflow_dispatch: {}
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect load + stuck jobs
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          API="https://api.supabase.com/v1/projects/cjgqpusyxvltglcbnpvg/database/query"
          q(){ jq -n --arg query "$1" '{query:$query}' | curl -s -X POST "$API" -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" -H "Content-Type: application/json" --data @-; echo; }
          echo "== books by status =="
          q "select status, count(*) from public.books group by status order by count(*) desc;"
          echo "== books touched in last 2h (recent writes) =="
          q "select id, status, updated_at from public.books where updated_at > now() - interval '2 hours' order by updated_at desc limit 20;"
          echo "== active connections by state =="
          q "select state, count(*) from pg_stat_activity group by state;"
          echo "== longest running queries =="
          q "select pid, state, now()-query_start as dur, left(query,80) as q from pg_stat_activity where state<>'idle' and query not ilike '%pg_stat_activity%' order by query_start limit 10;"
