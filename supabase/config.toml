# Inbound webhooks are called by Shopify/Printify without a Supabase JWT, so the
# platform must not reject them before our own HMAC signature check runs.
[functions.shopify-webhook]
verify_jwt = false

[functions.printify-webhook]
verify_jwt = false

# The family-photo detector runs in the wizard BEFORE the login gate, so it must
# accept the anon/publishable key (no user JWT yet). It only does vision detection.
[functions.detect-family-photo]
verify_jwt = false

# The Monday release job is invoked by the GitHub Actions cron with a custom
# x-cron-secret header (not a Supabase JWT), so the platform must not pre-reject it.
[functions.release-subscription-books]
verify_jwt = false